<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe Online</title>
    <link rel="stylesheet" href="tictac.css">

    <!-- Firebase SDKs (use latest compat version for simple usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
</head>

<body>
    <h1>Tic Tac Toe Online</h1>

    <!-- Room joining / creation -->
    <div class="menu">
        <input type="text" id="roomCode" placeholder="Enter room code (or make one up)">
        <button id="joinBtn">Join / Create Game</button>
    </div>
    <!-- Chat area – appears after second player joins -->
<div id="chat-container" style="display: none;">
  <div id="chat-messages" class="chat-messages"></div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Type a message..." />
    <button id="chat-send">Send</button>
  </div>
</div>
    
    <!-- SCORE DISPLAY - exactly in the shaded area you marked -->
<div id="score-display" class="score">
  X: 0  O: 0
</div>

 <div class="reactions">
  <button class="reaction-btn" data-emoji="😂">😂</button>
  <button class="reaction-btn" data-emoji="😭">😭</button>
  <button class="reaction-btn" data-emoji="🤔">🤔</button>
  <button class="reaction-btn" data-emoji="👏">👏</button>
  <button class="reaction-btn" data-emoji="🤦">🤦</button>
</div>

    <!-- Floating reaction display (one per player screen) -->
<div id="floating-reaction" class="floating-reaction"></div>
    <!-- Status message -->
    <h2 id="status">Enter a room code to start</h2>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button id="reset">Restart Game</button>
